<aside class="sidebar">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
      </svg>
    </div>
    <span class="logo-text">FindMeBand</span>
  </div>

  <!-- Navigation -->
  <nav class="nav">
    <a class="nav-item" routerLink="/musician/home" routerLinkActive="nav-item--active">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      </span>
      <span class="nav-label">Home</span>
    </a>

    <a class="nav-item" routerLink="/musician/opportunities" routerLinkActive="nav-item--active">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
        </svg>
      </span>
      <span class="nav-label">Opportunities</span>
    </a>

    <a class="nav-item" routerLink="/musician/events" routerLinkActive="nav-item--active">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
      </span>
      <span class="nav-label">Events</span>
    </a>

    <a class="nav-item" routerLink="/musician/messages" routerLinkActive="nav-item--active">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>
      </span>
      <span class="nav-label">Messages</span>
    </a>

    <a class="nav-item" routerLink="/musician/my-bands" routerLinkActive="nav-item--active">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
      </span>
      <span class="nav-label">My Bands</span>
    </a>

    <a class="nav-item" routerLink="/musician/my-profile" routerLinkActive="nav-item--active">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </span>
      <span class="nav-label">My Profile</span>
    </a>
  </nav>

  <!-- Current User -->
  <div class="sidebar-footer">
    <div class="user-avatar" [style.background]="currentUser.color">
      {{ currentUser.initials }}
    </div>
    <div class="user-info">
      <span class="user-name">{{ currentUser.name }}</span>
      <span class="user-username">&#64;{{ currentUser.username }}</span>
    </div>
  </div>
</aside>
